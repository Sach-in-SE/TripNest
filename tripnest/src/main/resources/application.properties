spring.application.name=tripnest
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tripnest_db
spring.datasource.username=root
spring.datasource.password=lucky18
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

tripnest.app.jwtSecret=tripnestSecretKey123456789012345678901234567890
tripnest.app.jwtExpirationMs=86400000

tripnest.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port
server.port=8080